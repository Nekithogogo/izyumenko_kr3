<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки PWA</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#B8A8D9">
    <link rel="icon" href="icons/favicon-64x64.png" sizes="64x64" type="image/png">
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #F8F5FF;
            color: #5A4D75;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h1 {
            color: #8B7DB8;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 300;
        }
        .form-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 2px solid #D4C9E8;
        }
        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .form-row.reminder {
            grid-template-columns: 1.5fr 1.2fr 1fr;
        }
        input {
            border: 2px solid #D4C9E8;
            border-radius: 8px;
            padding: 12px;
            background: #FAF8FF;
            color: #5A4D75;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #B8A8D9;
            background: white;
        }
        button {
            background: linear-gradient(135deg, #B8A8D9, #9A8CC4);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            padding: 12px 20px;
            font-size: 14px;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(0);
        }
        #notes-list {
            list-style: none;
            padding: 0;
            margin-top: 25px;
        }
        #notes-list li {
            background: white;
            padding: 15px 18px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 5px solid #B8A8D9;
            box-shadow: 0 3px 8px rgba(154, 140, 196, 0.15);
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
        }
        #notes-list li .note-text {
            word-break: break-word;
        }
        #notes-list li .note-time {
            font-size: 12px;
            color: #9A8CC4;
            margin-top: 5px;
        }
        .note-icon {
            font-size: 18px;
        }
        footer {
            text-align: center;
            margin-top: 35px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            border: 2px solid #D4C9E8;
        }
        footer button {
            margin: 5px;
            min-width: 180px;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #9A8CC4;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(154, 140, 196, 0.4);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #B8A8D9;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Заметки с напоминаниями</h1>
        
        <div class="form-section">
            <form id="note-form" class="form-row">
                <input type="text" id="note-input" placeholder="Текст заметки" required>
                <button type="submit">Добавить</button>
            </form>
            
            <form id="reminder-form" class="form-row reminder">
                <input type="text" id="reminder-text" placeholder="Текст напоминания" required>
                <input type="datetime-local" id="reminder-time" required>
                <button type="submit">С напоминанием</button>
            </form>
        </div>
        
        <ul id="notes-list"></ul>
        
        <footer>
            <button id="enable-push"> Включить уведомления</button>
            <button id="disable-push" style="display:none; background: linear-gradient(135deg, #C9A8D9, #B888C4);">🔕 Отключить уведомления</button>
        </footer>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
